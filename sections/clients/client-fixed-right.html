<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Fixed Right – Master Section Library</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="font-['Manrope',_sans-serif] bg-white min-h-screen antialiased">

  <!-- Preview Header -->
  <div class="bg-[#f0f3f9] border-b border-gray-200 px-6 py-3 flex items-center justify-between">
    <a href="../../index.html" class="inline-flex items-center gap-2 text-[13px] font-semibold text-[#3f78e0] hover:underline">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
      Back to Master Section Library
    </a>
    <span class="text-[13px] font-semibold text-[#343f52]">Client Fixed Right</span>
  </div>

  <!-- Component -->
  <section class="bg-gray-50 border-b border-gray-200">
    <div class="container mx-auto px-4 md:px-6 py-14 md:py-16 max-w-[1320px]">
      
      <!-- Container Row -->
      <div class="flex flex-col lg:flex-row gap-10 lg:gap-8 xl:gap-12">
        
        <!-- Left Column -->
        <div class="w-full lg:w-4/12 lg:mt-2">
          <h2 class="text-[13px] font-bold uppercase text-[#adb5bd] tracking-widest mb-3">Our Clients</h2>
          <h3 class="text-[2.25rem] md:text-[2.5rem] leading-[1.2] font-bold text-[#343f52] mb-3 xl:pr-10 tracking-tight">Trusted by over 300+ clients</h3>
          <p class="text-[1.15rem] leading-relaxed text-[#60697b] mb-0 xl:pr-10">We bring solutions to make life easier for our customers.</p>
        </div>
        
        <!-- Right Column -->
        <div class="w-full lg:w-8/12">
          
          <!-- Brand Grid -->
          <div class="grid grid-cols-2 md:grid-cols-4 gap-x-0 md:gap-x-8 xl:gap-x-12 gap-y-12 items-center">
            
            <div class="col-span-1">
              <figure class="px-3 md:px-0 xl:px-2 m-0"><img src="../../assets/images/brands/z1.png" alt="Client 1" class="w-full h-auto object-contain opacity-70 hover:opacity-100 transition-opacity duration-300" /></figure>
            </div>
            
            <div class="col-span-1">
              <figure class="px-3 md:px-0 xl:px-2 m-0"><img src="../../assets/images/brands/z2.png" alt="Client 2" class="w-full h-auto object-contain opacity-70 hover:opacity-100 transition-opacity duration-300" /></figure>
            </div>
            
            <div class="col-span-1">
              <figure class="px-3 md:px-0 xl:px-2 m-0"><img src="../../assets/images/brands/z3.png" alt="Client 3" class="w-full h-auto object-contain opacity-70 hover:opacity-100 transition-opacity duration-300" /></figure>
            </div>
            
            <div class="col-span-1">
              <figure class="px-3 md:px-0 xl:px-2 m-0"><img src="../../assets/images/brands/z4.png" alt="Client 4" class="w-full h-auto object-contain opacity-70 hover:opacity-100 transition-opacity duration-300" /></figure>
            </div>
            
            <div class="col-span-1">
              <figure class="px-3 md:px-0 xl:px-2 m-0"><img src="../../assets/images/brands/z5.png" alt="Client 5" class="w-full h-auto object-contain opacity-70 hover:opacity-100 transition-opacity duration-300" /></figure>
            </div>
            
            <div class="col-span-1">
              <figure class="px-3 md:px-0 xl:px-2 m-0"><img src="../../assets/images/brands/z6.png" alt="Client 6" class="w-full h-auto object-contain opacity-70 hover:opacity-100 transition-opacity duration-300" /></figure>
            </div>
            
            <div class="col-span-1">
              <figure class="px-3 md:px-0 xl:px-2 m-0"><img src="../../assets/images/brands/z7.png" alt="Client 7" class="w-full h-auto object-contain opacity-70 hover:opacity-100 transition-opacity duration-300" /></figure>
            </div>
            
            <div class="col-span-1">
              <figure class="px-3 md:px-0 xl:px-2 m-0"><img src="../../assets/images/brands/z8.png" alt="Client 8" class="w-full h-auto object-contain opacity-70 hover:opacity-100 transition-opacity duration-300" /></figure>
            </div>
            
          </div>
        </div>

      </div>
    </div>
  </section>

</body>
</html>
