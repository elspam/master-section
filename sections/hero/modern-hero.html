<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Hero Section – Master Section Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="font-['Manrope',_sans-serif] bg-white antialiased">

    <div class="bg-[#f0f3f9] border-b border-gray-200 px-6 py-3 flex items-center justify-between z-[100] relative">
        <a href="../../index.html"
            class="inline-flex items-center gap-2 text-[13px] font-semibold text-[#3f78e0] hover:underline">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
            Back to Master Section Library
        </a>
        <span class="text-[13px] font-semibold text-[#343f52]">Modern Hero Section</span>
    </div>

    <section class="bg-white w-full overflow-hidden">
        <div class="max-w-[1320px] mx-auto px-6 pt-8 pb-14 md:pt-14 md:pb-20">

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-y-12 lg:gap-x-8 items-center mb-7 md:mb-10 lg:mb-16">

                <div
                    class="w-full lg:order-2 lg:col-span-6 lg:col-start-7 relative max-w-[500px] lg:max-w-none mx-auto px-4">

                    <div class="absolute -top-6 -left-4 w-16 h-20 opacity-40 -z-10 pointer-events-none"
                        style="background-image: radial-gradient(#3f78e0 2px, transparent 2.5px); background-size: 10px 10px;">
                    </div>

                    <div class="absolute -bottom-6 -right-3 w-[85%] h-[90%] bg-[#e8f1fd] rounded-[0.6rem] -z-20"></div>

                    <div class="rounded-[0.5rem] overflow-hidden shadow-[0_1rem_3rem_rgba(30,34,40,0.08)] bg-gray-50">
                        <img class="w-full h-auto block object-cover" src="../../assets/images/photos/about7.jpg"
                            alt="We bring solutions" />
                    </div>
                </div>

                <div
                    class="w-full lg:order-1 lg:col-span-5 text-center lg:text-left flex flex-col items-center lg:items-start lg:-mt-10">

                    <h1
                        class="text-[2.2rem] md:text-[2.8rem] lg:text-[3.2rem] font-extrabold text-[#343f52] tracking-tight leading-[1.15] mb-5">
                        We bring solutions to make life easier for our customers.
                    </h1>

                    <p
                        class="text-[17px] md:text-[20px] font-semibold text-[#60697b] leading-[1.45] mb-7 max-w-[550px] px-4 md:px-10 lg:px-0">
                        We have considered our solutions to support every stage of your growth.
                    </p>

                    <div class="flex flex-row items-center justify-center lg:justify-start gap-3 w-full">
                        <a href="#"
                            class="inline-block bg-[#3f78e0] text-white font-bold text-[14px] md:text-[15px] px-6 md:px-7 py-3 md:py-3.5 rounded-full hover:bg-[#3565be] hover:-translate-y-[2px] transition-all shadow-md">
                            Explore Now
                        </a>
                        <a href="#"
                            class="inline-block bg-transparent border-2 border-[#3f78e0] text-[#3f78e0] font-bold text-[14px] md:text-[15px] px-6 md:px-7 py-[10px] md:py-[12px] rounded-full hover:bg-[#3f78e0] hover:text-white hover:-translate-y-[2px] transition-all">
                            Free Trial
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </section>

</body>

</html>
