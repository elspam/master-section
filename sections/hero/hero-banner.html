<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devices Showcase Hero – Fully Responsive</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">

    <style>
        /* Mengamankan elemen dari efek kedipan sebelum animasi berjalan */
        .raw-cue {
            opacity: 0;
            will-change: transform, opacity;
        }
    </style>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    keyframes: {
                        cueFadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        cueSlideDown: {
                            '0%': { opacity: '0', transform: 'translateY(-30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        },
                        cueSlideUp: {
                            '0%': { opacity: '0', transform: 'translateY(30px)' },
                            '100%': { opacity: '1', transform: 'translateY(0)' },
                        }
                    },
                    animation: {
                        'cue-fade': 'cueFadeIn 1s ease-out forwards',
                        'cue-down': 'cueSlideDown 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards',
                        'cue-up': 'cueSlideUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards',
                    }
                }
            }
        }
    </script>
</head>

<body class="font-['Manrope',_sans-serif] bg-white antialiased overflow-x-hidden">

    <div class="bg-[#f0f3f9] border-b border-gray-200 px-6 py-3 flex items-center justify-between z-[100] relative">
        <a href="../../index.html"
            class="inline-flex items-center gap-2 text-[13px] font-semibold text-[#3f78e0] hover:underline">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
            Back to Master Section Library
        </a>
        <span class="text-[13px] font-semibold text-[#343f52]">Devices Showcase Hero</span>
    </div>

    <section class="bg-[#e8f1fd] w-full relative z-20">
        <div
            class="max-w-[1320px] mx-auto px-6 pt-12 pb-16 lg:pt-20 lg:pb-24 relative lg:min-h-[550px] flex items-center">

            <div class="grid grid-cols-1 lg:grid-cols-12 gap-y-8 lg:gap-x-8 w-full z-20 relative">

                <div class="w-full lg:col-span-7 relative">
                    <img class="raw-cue block mx-auto relative lg:absolute lg:top-[-44px] lg:left-[-35%] xl:left-[-30%] w-[90%] sm:w-[80%] md:w-[70%] lg:w-[135%] xl:w-[125%] max-w-none h-auto z-30 pointer-events-none"
                        src="../../assets/images/photos/devices.png" alt="Devices Showcase"
                        data-animation="animate-cue-fade" style="animation-delay: 200ms;" />
                </div>

                <div
                    class="w-full lg:col-span-5 lg:col-start-8 text-center lg:text-left flex flex-col items-center lg:items-start mt-6 lg:mt-0">

                    <h1 class="raw-cue text-[2rem] md:text-[2.6rem] lg:text-[2.8rem] font-extrabold text-[#343f52] tracking-tight leading-[1.15] mb-4"
                        data-animation="animate-cue-down" style="animation-delay: 400ms;">
                        Get all of your steps, exercise, sleep and meds in one place.
                    </h1>

                    <p class="raw-cue text-[16px] md:text-[18px] font-semibold text-[#60697b] leading-[1.5] mb-7 max-w-[500px] px-2 md:px-6 lg:px-0"
                        data-animation="animate-cue-down" style="animation-delay: 650ms;">
                        Sandbox is now available to download from both the App Store and Google Play Store.
                    </p>

                    <div class="raw-cue flex flex-row items-center justify-center lg:justify-start gap-3 w-full"
                        data-animation="animate-cue-up" style="animation-delay: 900ms;">
                        <a href="#"
                            class="inline-flex items-center gap-2 bg-[#3f78e0] text-white font-bold text-[14px] px-5 py-3 rounded hover:bg-[#3565be] transition-all hover:-translate-y-[2px] shadow-md">
                            <i class="uil uil-apple text-[17px] leading-none"></i> App Store
                        </a>
                        <a href="#"
                            class="inline-flex items-center gap-2 bg-[#45c4a0] text-white font-bold text-[14px] px-5 py-3 rounded hover:bg-[#39aa8a] transition-all hover:-translate-y-[2px] shadow-md">
                            <i class="uil uil-google-play text-[16px] leading-none"></i> Google Play
                        </a>
                    </div>

                </div>

            </div>
        </div>
    </section>

    <section class="bg-white w-full h-24 lg:h-44 relative z-10"></section>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const elementsToAnimate = document.querySelectorAll('.raw-cue');

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        const element = entry.target;
                        const animationClass = element.getAttribute('data-animation');

                        element.classList.add(animationClass);
                        observer.unobserve(element);
                    }
                });
            }, {
                threshold: 0.01,
                rootMargin: "0px 0px -10px 0px"
            });

            elementsToAnimate.forEach(el => observer.observe(el));
        });
    </script>
</body>

</html>
