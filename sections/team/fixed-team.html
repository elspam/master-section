<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Team Section - Tailwind</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="font-['Manrope',_sans-serif] bg-white antialiased">
     <div class="bg-[#f0f3f9] border-b border-gray-200 px-6 py-3 flex items-center justify-between z-[100] relative">
        <a href="../../index.html"
            class="inline-flex items-center gap-2 text-[13px] font-semibold text-[#3f78e0] hover:underline">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
            Back to Master Section Library
        </a>
        <span class="text-[13px] font-semibold text-[#343f52]">Team Fixed</span>
    </div>

    <section class="bg-white">
        <div class="container mx-auto max-w-[1320px] px-6 py-14 md:py-16">

            <!-- Heading -->
            <div class="flex justify-center mb-12">
                <div class="w-full xl:max-w-5xl text-center">
                    <h2 class="uppercase tracking-[0.16em] text-[#aab0bc] font-bold text-[0.75rem] mb-3">
                        Our Team
                    </h2>

                    <h3 class="text-[#343f52] font-bold leading-tight text-[2rem] md:text-[2.5rem] lg:px-20 xl:px-24">
                        Think unique and be innovative. Make a difference with Sandbox.
                    </h3>
                </div>
            </div>

            <!-- Team Grid -->
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-y-8 md:gap-8 xl:gap-10">

                <!-- Card 1 -->
                <div class="relative">
                    <div class="absolute bottom-[-12px] right-[-12px] w-[98%] h-[98%] rounded-xl bg-blue-100"></div>

                    <div class="relative bg-white rounded-xl shadow-sm overflow-hidden">
                        <figure>
                            <img src="../../assets/images/avatars/t1.jpg" class="w-full h-auto object-cover"
                                alt="Coriss Ambady">
                        </figure>

                        <div class="px-6 py-5">
                            <h4 class="text-[1.1rem] font-bold text-[#343f52] mb-1">
                                Coriss Ambady
                            </h4>

                            <p class="text-[#60697b]">
                                Financial Analyst
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Card 2 -->
                <div class="relative">
                    <div class="absolute bottom-[-12px] right-[-12px] w-[98%] h-[98%] rounded-xl bg-red-100"></div>

                    <div class="relative bg-white rounded-xl shadow-sm overflow-hidden">
                        <figure>
                            <img src="../../assets/images/avatars/t2.jpg" class="w-full h-auto object-cover" alt="Cory Zamora">
                        </figure>

                        <div class="px-6 py-5">
                            <h4 class="text-[1.1rem] font-bold text-[#343f52] mb-1">
                                Cory Zamora
                            </h4>

                            <p class="text-[#60697b]">
                                Marketing Specialist
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Card 3 -->
                <div class="relative">
                    <div class="absolute bottom-[-12px] right-[-12px] w-[98%] h-[98%] rounded-xl bg-green-100"></div>

                    <div class="relative bg-white rounded-xl shadow-sm overflow-hidden">
                        <figure>
                            <img src="../../assets/images/avatars/t3.jpg" class="w-full h-auto object-cover"
                                alt="Nikolas Brooten">
                        </figure>

                        <div class="px-6 py-5">
                            <h4 class="text-[1.1rem] font-bold text-[#343f52] mb-1">
                                Nikolas Brooten
                            </h4>

                            <p class="text-[#60697b]">
                                Sales Manager
                            </p>
                        </div>
                    </div>
                </div>

                <!-- Card 4 -->
                <div class="relative">
                    <div class="absolute bottom-[-12px] right-[-12px] w-[98%] h-[98%] rounded-xl bg-violet-100"></div>

                    <div class="relative bg-white rounded-xl shadow-sm overflow-hidden">
                        <figure>
                            <img src="../../assets/images/avatars/t4.jpg" class="w-full h-auto object-cover"
                                alt="Jackie Sanders">
                        </figure>

                        <div class="px-6 py-5">
                            <h4 class="text-[1.1rem] font-bold text-[#343f52] mb-1">
                                Jackie Sanders
                            </h4>

                            <p class="text-[#60697b]">
                                Investment Planner
                            </p>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </section>

</body>

</html>
