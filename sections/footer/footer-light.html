<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Footer Component Light – Master Section Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css" />
</head>

<body class="font-['Manrope',_sans-serif] bg-white min-h-screen antialiased flex flex-col justify-between">

    <main class="flex-grow flex items-center justify-center p-6 bg-gray-50">
        <p class="text-gray-400 font-semibold text-sm uppercase tracking-wider">Main Content Area</p>
    </main>

    <footer class="bg-white text-[#60697b] pt-[2rem] ">
        <div class="container mx-auto px-6 pb-[1.75rem] max-w-[1320px]">
            
            <div class="grid grid-cols-1 lg:grid-cols-12 gap-y-10 lg:gap-x-0 items-start">
                
                <div class="lg:col-span-4">
                    <div class="widget">
                        <img class="mb-4 h-6 w-auto lg-mx:0" src="../../assets/images/logo-dark.png" alt="Logo" />
                        <p class="text-[17px] leading-[1.65] font-medium text-[#343f52]">
                            We are trusted by over 5000+ clients. Join them by using our services and grow your business.
                        </p>
                    </div>
                </div>

                <div class="lg:col-span-3 lg:col-start-7">
                    <div class="widget">
                        <div class="flex flex-row items-start">
                            <div class="text-[#3f78e0] text-[28px] mr-4 -mt-1 leading-none">
                                <i class="uil uil-phone-volume"></i>
                            </div>
                            <div>
                                <h5 class="text-[15px] font-bold text-[#343f52] mb-1 tracking-wide uppercase text-[12px]">Phone</h5>
                                <p class="text-[15px] leading-[1.65] text-[#60697b]">
                                    00 (123) 456 78 90 <br />00 (987) 654 32 10
                                </p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-3">
                    <div class="widget">
                        <div class="flex flex-row items-start">
                            <div class="text-[#3f78e0] text-[28px] mr-4 -mt-1 leading-none">
                                <i class="uil uil-location-pin-alt"></i>
                            </div>
                            <div>
                                <h5 class="text-[15px] font-bold text-[#343f52] mb-1 tracking-wide uppercase text-[12px]">Address</h5>
                                <address class="not-italic text-[15px] leading-[1.65] text-[#60697b]">
                                    Moonshine St. 14/05 Light City, London, United Kingdom
                                </address>
                            </div>
                        </div>
                    </div>
                </div>

            </div>

            <hr class="border-gray-200 mt-[3.25rem] md:mt-[4.5rem] mb-[1.75rem]" />

            <div class="flex flex-col md:flex-row items-center justify-between gap-4">
                <p class="text-[15px] text-[#60697b] order-2 md:order-1">
                    © 2024 Sandbox. All rights reserved.
                </p>
                <nav class="flex items-center gap-4 text-[#aab0bc] order-1 md:order-2">
                    <a href="#" class="hover:text-[#3f78e0] transition-colors"><i class="uil uil-twitter text-[1.1rem]"></i></a>
                    <a href="#" class="hover:text-[#3f78e0] transition-colors"><i class="uil uil-facebook-f text-[1.1rem]"></i></a>
                    <a href="#" class="hover:text-[#3f78e0] transition-colors"><i class="uil uil-dribbble text-[1.1rem]"></i></a>
                    <a href="#" class="hover:text-[#3f78e0] transition-colors"><i class="uil uil-instagram text-[1.1rem]"></i></a>
                    <a href="#" class="hover:text-[#3f78e0] transition-colors"><i class="uil uil-youtube text-[1.1rem]"></i></a>
                </nav>
            </div>

        </div>
    </footer>
    </body>
</html>
