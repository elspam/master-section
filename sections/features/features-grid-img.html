<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery Portfolio Section – Master Section Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://unicons.iconscout.com/release/v4.0.8/css/line.css">
</head>

<body class="font-['Manrope',_sans-serif] bg-white antialiased">

    <div class="bg-[#f0f3f9] border-b border-gray-200 px-6 py-3 flex items-center justify-between z-[100] relative">
        <a href="../../index.html"
            class="inline-flex items-center gap-2 text-[13px] font-semibold text-[#3f78e0] hover:underline">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
            Back to Master Section Library
        </a>
        <span class="text-[13px] font-semibold text-[#343f52]">Gallery Portfolio Section</span>
    </div>

    <section class="bg-[#f0f3f9]/40 w-full">
        <div class="max-w-[1320px] mx-auto px-6 py-14 md:py-16">

            <div class="max-w-[650px] mx-auto text-center mb-10 md:mb-12">
                <div class="text-[#45c4a0] text-[30px] opacity-30 leading-none">
                    <i class="uil uil-flower"></i>
                </div>
                <h2
                    class="text-[1.65rem] md:text-[2rem] font-extrabold text-[#343f52] tracking-tight leading-[1.3] mt-2">
                    I absolutely love shooting weddings and couples because there are so many feelings to capture.
                </h2>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-y-8 gap-x-8 xl:gap-x-10 text-center">

                <div class="w-full max-w-[400px] md:max-w-none mx-auto">
                    <div
                        class="bg-white rounded-[0.4rem] overflow-hidden shadow-[0_0.25rem_1.75rem_rgba(30,34,40,0.07)]">

                        <div class="relative group overflow-hidden cursor-pointer">
                            <img class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"
                                src="../../assets/images/photos/fs1.jpg" alt="Wedding Gallery" />

                            <div
                                class="absolute inset-0 bg-[#21262c]/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center z-10">
                                <h5
                                    class="text-white text-[15px] font-bold tracking-wide uppercase transform -translate-y-3 group-hover:translate-y-0 transition-transform duration-300">
                                    View Gallery
                                </h5>
                            </div>
                        </div>

                        <div class="p-6 bg-white border-t border-gray-50">
                            <h3 class="text-[17px] font-bold text-[#343f52] tracking-tight mb-0">Wedding</h3>
                        </div>
                    </div>
                </div>

                <div class="w-full max-w-[400px] md:max-w-none mx-auto">
                    <div
                        class="bg-white rounded-[0.4rem] overflow-hidden shadow-[0_0.25rem_1.75rem_rgba(30,34,40,0.07)]">

                        <div class="relative group overflow-hidden cursor-pointer">
                            <img class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"
                                src="../../assets/images/photos/fs2.jpg" alt="Couples Gallery" />

                            <div
                                class="absolute inset-0 bg-[#21262c]/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center z-10">
                                <h5
                                    class="text-white text-[15px] font-bold tracking-wide uppercase transform -translate-y-3 group-hover:translate-y-0 transition-transform duration-300">
                                    View Gallery
                                </h5>
                            </div>
                        </div>

                        <div class="p-6 bg-white border-t border-gray-50">
                            <h3 class="text-[17px] font-bold text-[#343f52] tracking-tight mb-0">Couples</h3>
                        </div>
                    </div>
                </div>

                <div class="w-full max-w-[400px] md:max-w-none mx-auto md:col-span-2 lg:col-span-1 md:w-1/2 lg:w-full">
                    <div
                        class="bg-white rounded-[0.4rem] overflow-hidden shadow-[0_0.25rem_1.75rem_rgba(30,34,40,0.07)]">

                        <div class="relative group overflow-hidden cursor-pointer">
                            <img class="w-full h-full object-cover transition-transform duration-300 group-hover:scale-105"
                                src="../../assets/images/photos/fs3.jpg" alt="Engagement Gallery" />

                            <div
                                class="absolute inset-0 bg-[#21262c]/40 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center z-10">
                                <h5
                                    class="text-white text-[15px] font-bold tracking-wide uppercase transform -translate-y-3 group-hover:translate-y-0 transition-transform duration-300">
                                    View Gallery
                                </h5>
                            </div>
                        </div>

                        <div class="p-6 bg-white border-t border-gray-50">
                            <h3 class="text-[17px] font-bold text-[#343f52] tracking-tight mb-0">Engagement</h3>
                        </div>
                    </div>
                </div>

            </div>

        </div>
    </section>

</body>

</html>
