<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Icon – Master Section Library</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
</head>

<body class="font-['Manrope',_sans-serif] bg-white antialiased">

    <div class="bg-[#f0f3f9] border-b border-gray-200 px-6 py-3 flex items-center justify-between z-[100] relative">
        <a href="../../index.html"
            class="inline-flex items-center gap-2 text-[13px] font-semibold text-[#3f78e0] hover:underline">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7" />
            </svg>
            Back to Master Section Library
        </a>
        <span class="text-[13px] font-semibold text-[#343f52]">World Icon Facts</span>
    </div>

    <section class="w-full bg-[url('../../assets/images/map.png')] bg-no-repeat bg-center bg-contain bg-white">
        <div class="max-w-[1320px] mx-auto px-6 py-14 pt-md-16 pb-md-18">

            <div class="max-w-[700px] mx-auto text-center pt-4 md:pt-12 mb-10 md:mb-12">
                <h2 class="text-[13px] tracking-[0.05em] font-extrabold text-uppercase text-[#aab0bc] uppercase mb-3">
                    Join Our Community
                </h2>
                <h3
                    class="text-[1.8rem] md:text-[2.2rem] font-extrabold text-[#343f52] tracking-tight leading-[1.25] md:px-6 lg:px-12">
                    We are trusted by over 5000+ clients. Join them now and grow your business.
                </h3>
            </div>

            <div class="max-w-[650px] mx-auto pb-4 md:pb-12">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-y-8 md:gap-y-0 md:gap-x-4 text-center">

                    <div class="counter-item" data-target="7518">
                        <h3
                            class="text-[2.2rem] md:text-[2.6rem] font-extrabold text-[#3f78e0] tracking-tight leading-none mb-2">
                            <span class="counter-value">375</span>
                        </h3>
                        <p class="text-[14px] md:text-[15px] font-semibold text-[#60697b]">
                            Completed Projects
                        </p>
                    </div>

                    <div class="counter-item" data-target="5472">
                        <h3
                            class="text-[2.2rem] md:text-[2.6rem] font-extrabold text-[#3f78e0] tracking-tight leading-none mb-2">
                            <span class="counter-value">0</span>
                        </h3>
                        <p class="text-[14px] md:text-[15px] font-semibold text-[#60697b]">
                            Happy Customers
                        </p>
                    </div>

                    <div class="counter-item" data-target="2184">
                        <h3
                            class="text-[2.2rem] md:text-[2.6rem] font-extrabold text-[#3f78e0] tracking-tight leading-none mb-2">
                            <span class="counter-value">0</span>
                        </h3>
                        <p class="text-[14px] md:text-[15px] font-semibold text-[#60697b]">
                            Expert Employees
                        </p>
                    </div>

                </div>
            </div>

        </div>
    </section>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const counters = document.querySelectorAll('.counter-item');

            const startCounter = (item) => {
                const target = parseInt(item.getAttribute('data-target'), 10);
                const valueDisplay = item.querySelector('.counter-value');

                let start = 0;
                const duration = 2000; // Durasi animasi dalam milidetik (2 detik)

                // Menghitung penambahan angka per frame agar animasi selesai bersamaan secara konstan
                const startTime = performance.now();

                const updateCounter = (currentTime) => {
                    const elapsedTime = currentTime - startTime;
                    const progress = Math.min(elapsedTime / duration, 1);

                    // Efek Easing Out Quad untuk pergerakan melambat yang mulus di akhir
                    const easeProgress = progress * (2 - progress);

                    const currentValue = Math.floor(easeProgress * target);
                    valueDisplay.textContent = currentValue;

                    if (progress < 1) {
                        requestAnimationFrame(updateCounter);
                    } else {
                        valueDisplay.textContent = target; // Memastikan angka pas di target akhir
                    }
                };

                requestAnimationFrame(updateCounter);
            };

            // IntersectionObserver memastikan animasi berjalan tepat ketika section masuk ke layar pandang (viewport)
            const observer = new IntersectionObserver((entries, observer) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        startCounter(entry.target);
                        observer.unobserve(entry.target); // Hanya jalankan animasi sekali saja
                    }
                });
            }, { threshold: 0.2 });

            counters.forEach(counter => observer.observe(counter));
        });
    </script>
</body>

</html>
